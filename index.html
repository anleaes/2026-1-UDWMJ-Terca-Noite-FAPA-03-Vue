<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infraestrutura App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #12141c;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }

      .app-layout {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 240px;
        background: #181b26;
        border-right: 1px solid rgba(255, 255, 255, 0.07);
        color: #f1f5f9;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        transition:
          transform 0.25s ease,
          width 0.25s ease;
      }
      .sidebar-brand {
        padding: 1.25rem 1.5rem;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: 0.3px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .brand-id {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        overflow: hidden;
        white-space: nowrap;
      }
      .sidebar-toggle {
        flex-shrink: 0;
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.6);
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .sidebar-toggle:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }
      .sidebar-nav {
        padding: 1rem 0;
        flex: 1;
        overflow-y: auto;
      }
      .sidebar-section-label {
        text-transform: uppercase;
        font-size: 0.65rem;
        letter-spacing: 1.2px;
        color: rgba(255, 255, 255, 0.3);
        padding: 0 1.5rem;
        margin-bottom: 0.25rem;
      }
      .sidebar-link {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.65rem 1.5rem;
        color: #8b93a7;
        text-decoration: none;
        font-size: 0.875rem;
        transition:
          color 0.15s,
          background 0.15s;
        border-left: 3px solid transparent;
      }
      .sidebar-link:hover {
        color: #f1f5f9;
        background: rgba(99, 102, 241, 0.08);
      }
      .sidebar-link.active {
        color: #a5b4fc;
        background: rgba(99, 102, 241, 0.15);
        border-left-color: #6366f1;
      }
      .sidebar-link .q-icon {
        flex-shrink: 0;
        width: 20px;
        text-align: center;
      }

      .sidebar-footer {
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        padding: 0.75rem 1rem;
      }
      .sidebar-user {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.8rem;
        color: #7c8499;
        padding: 0 0.5rem 0.5rem;
        white-space: nowrap;
        overflow: hidden;
      }
      .sidebar-username {
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sidebar-logout {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        width: 100%;
        padding: 0.55rem 0.75rem;
        background: rgba(251, 113, 133, 0.1);
        border: 1px solid rgba(251, 113, 133, 0.2);
        border-radius: 8px;
        color: #fb7185;
        font-size: 0.875rem;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .sidebar-logout:hover {
        background: rgba(251, 113, 133, 0.2);
        color: #fda4af;
      }

      .main-wrapper {
        margin-left: 240px;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        transition: margin-left 0.25s ease;
      }
      .main-content {
        flex: 1;
        padding: 2rem;
      }

      .topbar {
        display: none;
        align-items: center;
        padding: 0.5rem 0.75rem;
        background: #181b26;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        position: sticky;
        top: 0;
        z-index: 50;
        gap: 0.5rem;
      }
      .topbar-title {
        font-size: 0.95rem;
        font-weight: 700;
        color: #f1f5f9;
        letter-spacing: 0.2px;
      }
      .topbar-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .topbar-user {
        display: none;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.8rem;
        color: #8b93a7;
      }
      @media (min-width: 480px) {
        .topbar-user {
          display: flex;
        }
      }
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 99;
      }

      @media (max-width: 991.98px) {
        .sidebar {
          transform: translateX(-100%);
        }
        .sidebar.sidebar-open {
          transform: translateX(0);
        }
        .sidebar-overlay {
          display: block;
        }
        .main-wrapper {
          margin-left: 0;
        }
        .topbar {
          display: flex;
        }
        .main-content {
          padding: 1.25rem;
        }
      }

      @media (min-width: 992px) {
        .app-layout.sidebar-collapsed .sidebar {
          width: 76px;
        }
        .app-layout.sidebar-collapsed .main-wrapper {
          margin-left: 76px;
        }
        .app-layout.sidebar-collapsed .brand-id,
        .app-layout.sidebar-collapsed .sidebar-link span,
        .app-layout.sidebar-collapsed .sidebar-section-label,
        .app-layout.sidebar-collapsed .sidebar-username,
        .app-layout.sidebar-collapsed .logout-label {
          display: none;
        }
        .app-layout.sidebar-collapsed .sidebar-brand {
          justify-content: center;
          padding-left: 0;
          padding-right: 0;
        }
        .app-layout.sidebar-collapsed .sidebar-link {
          justify-content: center;
          padding-left: 0;
          padding-right: 0;
          border-left-color: transparent;
        }
        .app-layout.sidebar-collapsed .sidebar-link i {
          width: auto;
        }
        .app-layout.sidebar-collapsed .sidebar-footer {
          padding-left: 0.5rem;
          padding-right: 0.5rem;
        }
        .app-layout.sidebar-collapsed .sidebar-user {
          justify-content: center;
          padding-left: 0;
          padding-right: 0;
        }
      }

      .app-card {
        border: none;
        border-radius: 14px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      }
      .app-card .card-header {
        background: linear-gradient(135deg, #0d6efd, #6610f2);
        color: #fff;
        border-radius: 14px 14px 0 0;
        padding: 0.9rem 1.25rem;
      }
      .app-card .card-header h4 {
        margin: 0;
        font-weight: 600;
        font-size: 1.1rem;
      }

      /* ── Stat cards (Dashboard) ── */
      .stat-card {
        border-radius: 14px;
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }
      .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1) !important;
      }
      .stat-icon {
        width: 56px;
        height: 56px;
        flex-shrink: 0;
      }
      .stat-count {
        font-size: 1.75rem;
      }

      .table thead th {
        background-color: #f6f8fa;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #6c757d;
      }

      .badge-soft-success {
        background-color: #d1e7dd;
        color: #0f5132;
      }
      .badge-soft-danger {
        background-color: #f8d7da;
        color: #842029;
      }
      .badge-soft-warning {
        background-color: #fff3cd;
        color: #664d03;
      }
      .badge-soft-info {
        background-color: #cff4fc;
        color: #055160;
      }
      .badge-soft-secondary {
        background-color: #e2e3e5;
        color: #41464b;
      }

      .search-input .input-group-text,
      .search-input .form-control {
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.25);
        color: #fff;
      }
      .search-input .form-control::placeholder {
        color: rgba(255, 255, 255, 0.55);
      }
      .search-input .form-control:focus {
        background: rgba(255, 255, 255, 0.2);
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
        border-color: rgba(255, 255, 255, 0.4);
        color: #fff;
      }

      .skeleton {
        background: linear-gradient(90deg, #e2e5e9 25%, #edf0f3 50%, #e2e5e9 75%);
        background-size: 200% 100%;
        animation: skeleton-pulse 1.3s ease infinite;
        border-radius: 4px;
        display: inline-block;
      }
      @keyframes skeleton-pulse {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      .modal-backdrop-custom {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1050;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .modal-dialog-custom {
        max-width: 420px;
        width: 100%;
        border-radius: 14px;
        overflow: hidden;
        transition: transform 0.2s ease;
      }

      .page-fade-enter-active,
      .page-fade-leave-active {
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }
      .page-fade-enter-from {
        opacity: 0;
        transform: translateY(6px);
      }
      .page-fade-leave-to {
        opacity: 0;
        transform: translateY(-6px);
      }

      .modal-enter-active,
      .modal-leave-active {
        transition: opacity 0.2s ease;
      }
      .modal-enter-from,
      .modal-leave-to {
        opacity: 0;
      }
      .modal-enter-from .modal-dialog-custom,
      .modal-leave-to .modal-dialog-custom {
        transform: scale(0.94);
      }

      .toast-enter-active,
      .toast-leave-active {
        transition: all 0.3s ease;
      }
      .toast-enter-from,
      .toast-leave-to {
        opacity: 0;
        transform: translateX(60px);
      }

      .list-enter-active,
      .list-leave-active {
        transition: opacity 0.22s ease;
      }
      .list-enter-from,
      .list-leave-to {
        opacity: 0;
      }

      .slide-down-enter-active,
      .slide-down-leave-active {
        transition: all 0.25s ease;
      }
      .slide-down-enter-from,
      .slide-down-leave-to {
        opacity: 0;
        transform: translateY(-8px);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
