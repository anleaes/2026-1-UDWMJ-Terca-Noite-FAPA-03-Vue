<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infraestrutura App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <style>
      body { background-color: #f5f7fa; }
      .navbar-brand { font-weight: 600; letter-spacing: .3px; }
      .app-card { border: none; border-radius: 14px; box-shadow: 0 4px 14px rgba(0,0,0,.06); }
      .app-card .card-header { background: linear-gradient(135deg, #0d6efd, #6610f2); color: #fff; border-radius: 14px 14px 0 0; padding: 1rem 1.25rem; }
      .app-card .card-header h4 { margin: 0; font-weight: 600; }
      .table thead th { background-color: #f1f3f5; }
      .badge-soft-success { background-color: #d1e7dd; color: #0f5132; }
      .badge-soft-danger { background-color: #f8d7da; color: #842029; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
